services:
  - type: web
    name: university-subject-api
    runtime: node
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /University/subjects
    envVars:
      - key: MONGO_URI
        sync: false
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
